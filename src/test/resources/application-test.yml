spring:
  rabbitmq:
    host: localhost
    port: 62999
    listener:
      simple:
        auto-startup: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

security:
