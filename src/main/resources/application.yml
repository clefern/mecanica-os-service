spring:
  application:
    name: os-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/os_service}
    username: ${DB_USER:mecanica}
    password: ${DB_PASS:mecanica}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    virtual-host: /

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

security:
  jwt:
    secret-key: ${SECURITY_JWT_SECRET_KEY:ZGV2U2VjcmV0S2V5Rm9yTG9jYWxEZXZlbG9wbWVudE9ubHkzMkJ5dGVz}
    expiration-time: ${JWT_EXPIRATION_TIME:86400000}

seeding:
  enabled: ${SEEDING_ENABLED:true}
